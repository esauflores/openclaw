services:
  # Add this if dev-tools is isolated for openclaw
  # dev-tools:
  #   build:
  #     context: dev-tools
  #     args:
  #       - MISE_VERSION=2026.1.7
  #       - TOOLS_DIR=/tools
  #   environment:
  #     - GITHUB_TOKEN=${GITHUB_TOKEN}
  #   volumes:
  #     - dev-tools:/tools
  #   restart: no

  tailscale:
    build: tunnel
    hostname: ${TS_HOSTNAME}
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - tailscale-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=${TS_HOSTNAME}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    restart: unless-stopped

  filebrowser:
    build: filebrowser
    volumes:
      - openclaw-data:/srv
      - filebrowser-data:/database
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - FB_PORT=${FB_PORT:-8080}
    restart: unless-stopped

  openclaw:
    build: .
    environment:
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-1}
      OPENCLAW_STATE_DIR: /openclaw/.openclaw
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-loopback}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
    volumes:
      - openclaw-data:/openclaw
      - dev-tools:/tools:ro
    init: true
    restart: unless-stopped

volumes:
  dev-tools:
    name: dev-tools
  tailscale-state:
  filebrowser-data:
  openclaw-data:
