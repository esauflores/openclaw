services:
  tailscale:
    build: tunnel
    hostname: ${TS_HOSTNAME}
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - tailscale-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=${TS_HOSTNAME}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
    restart: unless-stopped

  filebrowser:
    build: filebrowser
    volumes:
      - openclaw-data:/srv
      - filebrowser-data:/database
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - FB_PORT=${FB_PORT:-8080}
    network_mode: host
    restart: unless-stopped

  dev-tools:
    build:
      context: dev-tools
      args:
        - MISE_VERSION=2026.1.7
        - TOOLS_DIR=/tools
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - dev-tools:/tools
    restart: no

  openclaw:
    build: .
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-1}
      OPENCLAW_STATE_DIR: /openclaw/.openclaw
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-loopback}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
    volumes:
      - openclaw-data:/openclaw
      - dev-tools:/tools:ro
    network_mode: host
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:18789/healthz"]
      interval: 10s
      timeout: 10s
      retries: 5
    depends_on:
      dev-tools:
        condition: service_completed_successfully

volumes:
  tailscale-state:
  filebrowser-data:
  dev-tools:
  openclaw-data:
